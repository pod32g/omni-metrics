services:
  omni-metrics:
    build:
      context: .
      args:
        VERSION: ${VERSION:-0.1.0-m1}
    image: omni-metrics:local
    container_name: omni-metrics
    restart: unless-stopped
    # Listen on all interfaces inside the container; the host port mapping
    # controls external exposure. CLI flags override the config's listen/storage,
    # so external reachability is guaranteed regardless of the config file.
    # The config file defines the scrape jobs (self + omni-identity).
    command: ["-config", "/etc/omni/omni.yml", "-listen", "0.0.0.0:9090", "-storage", "/data"]
    environment:
      # Optional: tee logs to omnilog. Off unless LOGSHIP_ENABLED=true. The API
      # key is a secret → host .env (gitignored), never committed.
      LOGSHIP_ENABLED: ${LOGSHIP_ENABLED:-false}
      LOGSHIP_URL: ${LOGSHIP_URL:-}
      LOGSHIP_API_KEY: ${LOGSHIP_API_KEY:-}
      LOGSHIP_SERVICE: ${LOGSHIP_SERVICE:-omni-metrics}
      # omni-identity /metrics bearer token (secret → host env / CI secret),
      # referenced as ${OMNI_IDENTITY_TOKEN} by the omni-identity scrape job.
      OMNI_IDENTITY_TOKEN: ${OMNI_IDENTITY_TOKEN:-}
    ports:
      - "9090:9090"
    volumes:
      - omni-metrics-data:/data
      - ./omni.yml:/etc/omni/omni.yml:ro
    healthcheck:
      # Distroless has no shell/curl, so the binary self-probes.
      test: ["CMD", "/omni", "healthcheck", "-url", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  omni-metrics-data:
    name: omni-metrics-data
