# Example omni-metrics configuration.
# Run: ./omni -config examples/omni.yml -storage ./data

global:
  scrape_interval: 15s
  scrape_timeout: 10s

storage:
  # WAL/data directory. Comment out (or run without -storage) for in-memory only.
  path: ./data
  # How long to keep samples in the head block.
  retention: 6h

web:
  # Bind loopback by default — exposing the server is an explicit choice.
  listen: 127.0.0.1:9090

scrape_configs:
  # Scrape omni-metrics' own /metrics endpoint.
  - job_name: omni
    static_configs:
      - targets: [127.0.0.1:9090]

  # Example: a node_exporter-style fleet (edit to taste).
  # - job_name: node
  #   scrape_interval: 30s
  #   static_configs:
  #     - targets: [node-01:9100, node-02:9100]

  # Secure scrape: a target whose /metrics requires a bearer token, over HTTPS.
  # Secrets are never committed — use ${ENV} expansion or *_file references.
  # - job_name: omni-identity
  #   scheme: https
  #   authorization:
  #     credentials: ${OMNI_IDENTITY_TOKEN}   # or credentials_file: /run/secrets/token
  #   tls_config:
  #     ca_file: /etc/ssl/ca.pem              # omit to use system roots
  #     server_name: omni-identity.internal
  #     # insecure_skip_verify: true          # last resort; prefer ca_file
  #   static_configs:
  #     - targets: [omni-identity:8081]
  #
  # Basic auth instead of bearer (mutually exclusive with authorization):
  # - job_name: legacy
  #   basic_auth:
  #     username: scraper
  #     password_file: /run/secrets/pw
  #   static_configs:
  #     - targets: [legacy:9100]

# Push ingestion: clients that cannot be scraped POST JSON samples to
# /api/v1/push. Append semantics (each push builds the time series).
push:
  enabled: true
  sample_limit: 0          # max samples per request; 0 = unlimited
  max_body_bytes: 16777216 # 16 MiB request-body cap
  auth_token: ""           # when set, requires "Authorization: Bearer <token>"

# Alerting engine: evaluates PromQL alert rules against Prometheus-compatible
# datasources, runs the OK->PENDING->FIRING->RESOLVED state machine, and persists
# rules/state/history to a SQLite database. Notification *delivery* (routing,
# escalation, channels) lives in a separate service, omni-notify; the optional
# `notify:` block below forwards firing/resolved transitions to it.
alerting:
  enabled: true                       # default true; set false to disable entirely
  # SQLite database path. Defaults to <storage.path>/alerts.db, or in-memory when
  # storage is in-memory.
  storage_path: ""
  # Datasource applied to rules that omit one. Defaults to the builtin "local".
  default_datasource: local
  # Forward firing/resolved alerts to omni-notify (https://github.com/pod32g/omni-notify).
  # Opt-in: disabled unless enabled: true. POSTs each transition to <url>/api/v1/events
  # with a bearer token. Best-effort delivery (in-memory queue + bounded retry).
  # notify:
  #   enabled: true
  #   url: http://omni-notify:8088        # omni-notify base URL
  #   token: ${OMNI_NOTIFY_TOKEN}         # bearer; via ${ENV}, never committed
  #   source: omni-metrics                # event "source" label (default omni-metrics)
  #   min_severity: ""                    # "" forwards all; or critical|error|warning|info|debug
  #   timeout: 5s                         # per-request HTTP timeout
  #   queue_size: 1024                    # in-memory buffer; a full buffer drops events
  #   max_retries: 3                      # retries after the first attempt (0 = none)
  datasources:
    # A builtin "local" datasource pointing at this server is auto-registered, so
    # this block is optional. Define one named "local" here to override its URL.
    # Datasources defined in config are read-only via the API.
    # - name: remote-prometheus
    #   type: prometheus
    #   url: https://prometheus.internal:9090
    #   timeout: 30s
    #   # Auth reuses the scrape auth shapes; secrets via ${ENV} or *_file.
    #   authorization:
    #     credentials: ${PROM_TOKEN}
    #   # basic_auth:                 # mutually exclusive with authorization
    #   #   username: alertmgr
    #   #   password_file: /run/secrets/prom_pw
    #   headers:
    #     X-Scope-OrgID: tenant-a     # e.g. Mimir/Cortex multi-tenancy
    #   enabled: true
