# omni-metrics runtime configuration.
# The deploy runs: omni -config /etc/omni/omni.yml -listen 0.0.0.0:9090 -storage /data
# CLI flags override web.listen / storage.path; scrape jobs are defined here.
global:
  scrape_interval: 15s
  scrape_timeout: 10s

storage:
  path: /data
  retention: 24h

web:
  listen: 0.0.0.0:9090

scrape_configs:
  # omni-metrics' own /metrics.
  - job_name: omni-metrics
    static_configs:
      - targets: [127.0.0.1:9090]

  # omni-identity — a separate compose project, reached via the host's published
  # port (8081 -> container 8080). Its /metrics requires a bearer token; the
  # value comes from the OMNI_IDENTITY_TOKEN env (CI secret / host env), never
  # committed. Same-host hop, so plain http is acceptable here.
  - job_name: omni-identity
    authorization:
      credentials: ${OMNI_IDENTITY_TOKEN}
    static_configs:
      - targets: [192.168.68.34:8081]

# Alerting: the engine runs with defaults (builtin "local" datasource). Forward
# firing/resolved transitions to omni-notify — a separate compose project reached
# via the host's published port (8088 -> container 8080). The bearer token comes
# from OMNI_NOTIFY_TOKEN (host env / CI secret), never committed. Same-host hop,
# so plain http is acceptable.
alerting:
  notify:
    enabled: true
    url: http://192.168.68.34:8088
    token: ${OMNI_NOTIFY_TOKEN}
