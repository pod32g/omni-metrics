<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>omni-metrics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="cluster">
      <a class="brand" href="#/graph" aria-label="omni-metrics home">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" aria-hidden="true">
          <circle cx="13" cy="13" r="11" stroke="var(--border)" stroke-width="2"/>
          <path d="M4.2 17.5 A11 11 0 0 1 21.8 17.5" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M13 13 L18 8.6" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round"/>
          <circle cx="13" cy="13" r="2.2" fill="var(--accent)"/>
        </svg>
        <span class="wordmark"><b>omni</b><span class="muted">metrics</span></span>
      </a>
      <nav class="nav" id="nav">
        <a href="#/graph" data-route="graph">Graph</a>
        <a href="#/targets" data-route="targets">Targets</a>
        <a href="#/status" data-route="status">Status</a>
      </nav>
    </div>
    <div class="cluster">
      <div class="live" id="live"><span class="dot ok"></span><span class="mono" id="live-text">live · 15s</span></div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle color theme">
        <span class="seg" data-theme-btn="dark" title="Dark">
          <svg width="15" height="15" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z" fill="currentColor"/></svg>
        </span>
        <span class="seg" data-theme-btn="light" title="Light">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6 19 19M19 5l-1.4 1.4M6.4 17.6 5 19"/></svg>
        </span>
      </button>
    </div>
  </header>
  <main id="view" class="view"></main>
  <script src="/app.js" defer></script>
</body>
</html>
